name: Daily Momentum Snapshot

on:
  schedule:
    # 07:30 UTC = 15:30 Asia/Taipei, ~30 min after TWSE close.
    - cron: "30 7 * * 1-5"
  workflow_dispatch:
    inputs:
      limit:
        description: "Cap on number of tickers (blank = all)"
        required: false
        default: ""
  push:
    # Touch data/.run-now (content = limit, blank = all) to trigger an
    # immediate snapshot. Lets us kick off runs from any client that can
    # commit a file (MCP, web editor) without using the Actions UI.
    paths:
      - "data/.run-now"

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Resolve limit (workflow_dispatch input or data/.run-now content)
        id: cfg
        run: |
          LIMIT="${{ inputs.limit }}"
          if [ -z "${LIMIT}" ] && [ -f data/.run-now ]; then
            LIMIT=$(tr -dc '0-9' < data/.run-now | head -c 6)
          fi
          echo "limit=${LIMIT}" >> "$GITHUB_OUTPUT"
          echo "Resolved limit='${LIMIT}'"

      - name: Rebuild wikilink index
        run: python -m momentum.cli build-index

      - name: Fetch prices + compute momentum
        env:
          LIMIT: ${{ steps.cfg.outputs.limit }}
        run: |
          if [ -n "${LIMIT}" ]; then
            python -m momentum.cli fetch-prices --limit "${LIMIT}"
          else
            python -m momentum.cli fetch-prices
          fi
          python -m momentum.cli compute

      - name: Fetch monthly revenue (fundamentals)
        continue-on-error: true
        run: python -m momentum.cli fetch-fundamentals

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/theme_index.json data/ticker_themes.json data/companies.json
          git add data/daily/ data/fundamentals/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "data: daily momentum snapshot ${DATE}"
          git push

      - name: Push daily alert
        continue-on-error: true
        env:
          MOMENTUM_WEBHOOK_URL: ${{ secrets.MOMENTUM_WEBHOOK_URL }}
        run: python -m momentum.cli alert
