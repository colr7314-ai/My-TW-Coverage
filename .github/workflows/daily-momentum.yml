name: Daily Momentum Snapshot

on:
  schedule:
    # 07:30 UTC = 15:30 Asia/Taipei, ~30 min after TWSE close.
    - cron: "30 7 * * 1-5"
  workflow_dispatch:
    inputs:
      limit:
        description: "Cap on number of tickers (blank = all)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Rebuild wikilink index
        run: python -m momentum.cli build-index

      - name: Fetch prices + compute momentum
        env:
          LIMIT: ${{ inputs.limit }}
        run: |
          if [ -n "${LIMIT}" ]; then
            python -m momentum.cli fetch-prices --limit "${LIMIT}"
          else
            python -m momentum.cli fetch-prices
          fi
          python -m momentum.cli compute

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/theme_index.json data/ticker_themes.json data/companies.json
          git add data/daily/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "data: daily momentum snapshot ${DATE}"
          git push
